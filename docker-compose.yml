version: '3.8'

services:
  telegram-bot:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_NAME: vocabulary_db
      DB_USER: vocabulary_user
      DB_PASSWORD: vocabulary_password

  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: vocabulary_db
      POSTGRES_USER: vocabulary_user
      POSTGRES_PASSWORD: vocabulary_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: