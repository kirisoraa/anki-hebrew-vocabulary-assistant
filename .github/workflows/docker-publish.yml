name: Build and Push to GitHub Container Registry

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: kirisoraa
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Get commit count for versioning
      id: commit_count
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        echo "commit_count=$COMMIT_COUNT" >> $GITHUB_ENV
    
    - name: Set version
      id: version
      run: |
        # Start at version 1.0 and increment with each commit
        MAJOR=1
        MINOR=0
        PATCH=${{ env.commit_count }}
        VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "version=$VERSION" >> $GITHUB_ENV
    
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ghcr.io/kirisoraa/anki-hebrew-vocabulary-assistant:${{ env.version }}
          ghcr.io/kirisoraa/anki-hebrew-vocabulary-assistant:latest
      